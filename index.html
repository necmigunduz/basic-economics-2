<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AP Economics — Quiz 3: PPC, Trade & Comparative Advantage</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ffffff;--surface:#f6f8fa;--card:#ffffff;--border:#d0d7de;
  --accent:#1a3a5c;--accent2:#0969da;--green:#1a7f37;--red:#cf222e;
  --purple:#6639ba;--text:#1f2328;--muted:#636c76;--label:#24292f;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Lora',Georgia,serif;min-height:100vh;}
header{background:linear-gradient(160deg,#f0f5ff 0%,#ffffff 60%,#f0f5ff 100%);border-bottom:2px solid var(--border);padding:3rem 2rem 2.5rem;text-align:center;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(26,58,92,0.07),transparent);pointer-events:none;}
.hdr-eyebrow{display:inline-flex;align-items:center;gap:.5rem;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;border:1px solid rgba(26,58,92,.25);border-radius:99px;padding:.25rem 1rem;background:rgba(26,58,92,.06);}
header h1{font-family:'Playfair Display',serif;font-size:clamp(1.9rem,5vw,3.2rem);font-weight:800;color:var(--text);letter-spacing:-.02em;line-height:1.1;}
header h1 em{color:var(--accent2);font-style:normal;}
.hdr-sub{margin-top:.8rem;color:var(--muted);font-size:.9rem;letter-spacing:.04em;}
.hdr-pills{display:flex;justify-content:center;gap:.6rem;margin-top:1.2rem;flex-wrap:wrap;}
.hdr-pill{font-size:.74rem;color:var(--label);background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:.25rem .85rem;}
.progress-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:.85rem 2rem;display:flex;align-items:center;gap:1.2rem;position:sticky;top:0;z-index:100;}
.progress-bar{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .5s ease;width:0%;}
.progress-text{font-size:.8rem;color:var(--muted);white-space:nowrap;min-width:90px;text-align:right;}
.score-pill{font-size:.8rem;font-weight:600;color:var(--accent2);background:rgba(9,105,218,.08);border:1px solid rgba(9,105,218,.25);border-radius:99px;padding:.2rem .85rem;white-space:nowrap;}
main{max-width:960px;margin:0 auto;padding:2.5rem 1.5rem 5rem;display:flex;flex-direction:column;gap:1.8rem;}
.section-div{display:flex;align-items:center;gap:1rem;padding:.8rem 0 .2rem;border-bottom:2px solid var(--border);}
.section-div h2{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;color:var(--accent);white-space:nowrap;}
.section-div p{font-size:.85rem;color:var(--muted);}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .35s;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.q-card.answered-correct{border-color:var(--green);}
.q-card.answered-wrong{border-color:var(--red);}
.q-header{display:flex;align-items:center;gap:.9rem;padding:.9rem 1.4rem;border-bottom:1px solid var(--border);background:var(--surface);}
.q-num{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--accent);min-width:2.2rem;}
.q-badge{font-size:.68rem;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:99px;padding:.16rem .65rem;}
.q-status{margin-left:auto;font-size:1rem;opacity:0;transition:opacity .3s;}
.q-card.answered-correct .q-status,.q-card.answered-wrong .q-status{opacity:1;}
.q-graph{padding:1.1rem 1.4rem 0;}
.q-graph img{width:100%;border-radius:9px;border:1px solid var(--border);display:block;}
.q-body{padding:1.1rem 1.4rem .7rem;}
.q-stem{font-size:.93rem;color:var(--text);line-height:1.65;margin-bottom:.7rem;font-style:italic;white-space:pre-line;}
.q-question{font-size:1.02rem;font-weight:500;color:var(--text);line-height:1.55;}
.choices{padding:.35rem 1.4rem 1.3rem;display:flex;flex-direction:column;gap:.45rem;}
.choice{display:flex;align-items:flex-start;gap:.85rem;padding:.7rem 1rem;border-radius:9px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:background .15s,border-color .15s,transform .1s;font-size:.93rem;line-height:1.5;color:var(--label);user-select:none;}
.choice:hover:not(.disabled){background:rgba(9,105,218,.07);border-color:var(--accent2);color:var(--text);transform:translateX(3px);}
.choice-letter{font-family:'Playfair Display',serif;font-weight:700;font-size:.85rem;color:var(--accent2);min-width:1.2rem;padding-top:.05rem;flex-shrink:0;}
.choice.correct{background:rgba(26,127,55,.09);border-color:var(--green);color:var(--text);}
.choice.correct .choice-letter{color:var(--green);}
.choice.wrong{background:rgba(207,34,46,.09);border-color:var(--red);color:var(--text);}
.choice.wrong .choice-letter{color:var(--red);}
.choice.disabled{cursor:default;pointer-events:none;}
.choice.reveal-correct{background:rgba(26,127,55,.05);border-color:rgba(26,127,55,.35);color:var(--muted);}
.explanation{margin:0 1.4rem 1.3rem;padding:.85rem 1rem;border-radius:9px;border-left:3px solid var(--green);background:rgba(26,127,55,.05);font-size:.88rem;color:var(--label);line-height:1.7;display:none;}
.explanation.wrong-exp{border-color:var(--red);background:rgba(207,34,46,.05);}
.explanation strong{color:var(--text);}
.fr-card{background:var(--card);border:2px solid rgba(102,57,186,.35);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.fr-header{padding:1rem 1.4rem;border-bottom:1px solid var(--border);background:rgba(102,57,186,.04);display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;}
.fr-header h3{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--purple);}
.fr-badge{font-size:.68rem;text-transform:uppercase;letter-spacing:.14em;color:var(--purple);background:rgba(102,57,186,.08);border:1px solid rgba(102,57,186,.25);border-radius:99px;padding:.16rem .65rem;}
.fr-graph{padding:1.1rem 1.4rem 0;}
.fr-graph img{width:100%;border-radius:9px;border:1px solid var(--border);display:block;margin-bottom:.7rem;}
.fr-body{padding:1rem 1.4rem;}
.fr-context{font-size:.9rem;color:var(--text);line-height:1.7;margin-bottom:1rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.85rem 1rem;white-space:pre-line;}
.fr-parts{display:flex;flex-direction:column;gap:.75rem;padding:0 1.4rem 1.4rem;}
.fr-part{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:.85rem 1rem;}
.fr-part-label{font-family:'Playfair Display',serif;font-weight:700;color:var(--purple);font-size:.93rem;margin-bottom:.3rem;}
.fr-part-q{font-size:.94rem;color:var(--text);line-height:1.65;}
.fr-answer{margin-top:.55rem;padding:.7rem .95rem;background:rgba(26,127,55,.06);border-left:3px solid var(--green);border-radius:0 8px 8px 0;font-size:.88rem;color:var(--label);line-height:1.7;display:none;}
.fr-answer strong{color:var(--text);}
.show-answer-btn{margin-top:.5rem;padding:.3rem .95rem;border-radius:99px;border:1px solid rgba(26,127,55,.4);background:transparent;color:var(--green);font-family:'Lora',serif;font-size:.8rem;cursor:pointer;transition:background .15s;}
.show-answer-btn:hover{background:rgba(26,127,55,.08);}
#results{display:none;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2.5rem;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);}
#results h2{font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--accent);margin-bottom:.4rem;}
.score-big{font-size:3.8rem;font-family:'Playfair Display',serif;font-weight:800;color:var(--text);line-height:1;margin:.7rem 0;}
#results p{color:var(--muted);font-size:.95rem;margin-bottom:.25rem;}
.btn-reset{margin-top:1.3rem;padding:.75rem 2.2rem;border-radius:99px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'Lora',serif;font-size:.95rem;font-weight:500;cursor:pointer;transition:opacity .2s,transform .15s;}
.btn-reset:hover{opacity:.88;transform:translateY(-2px);}
</style>
</head>

const MC=[{"num": 1, "graph": null, "stem": "A textile firm manufactures pants and shirts using sewing machines, factory workers, cotton fields, and a founder who organizes production.", "question": "Which of the following correctly matches each resource to its category?", "choices": ["Cotton fields = Labor; Sewing machines = Land; Workers = Capital; Founder = Entrepreneurship", "Cotton fields = Land; Sewing machines = Capital; Workers = Labor; Founder = Entrepreneurship", "Cotton fields = Capital; Sewing machines = Land; Workers = Labor; Founder = Land", "Cotton fields = Land; Sewing machines = Labor; Workers = Capital; Founder = Entrepreneurship", "Cotton fields = Entrepreneurship; Sewing machines = Capital; Workers = Labor; Founder = Land"], "answer": 1, "explanation": "The four resource categories are Land (natural resources \u2014 cotton fields), Capital (manufactured tools \u2014 sewing machines), Labor (human effort \u2014 workers), and Entrepreneurship (organizing production and bearing risk \u2014 the founder). Choice B is the only one that matches all four correctly. Choice A wrongly swaps Land and Labor. Choices C, D, and E misclassify at least two categories."}, {"num": 2, "graph": null, "stem": "Maria earns $25 per hour at her current job. She decides to attend a full-time graduate program that costs $15,000 per year in tuition and requires 40 hours per week of her time during the academic year (36 weeks).", "question": "What is the total opportunity cost of attending graduate school for one year?", "choices": ["$15,000 \u2014 only the tuition payment is a true cost", "$36,000 \u2014 only the forgone wages are a true cost", "$51,000 \u2014 tuition plus forgone wages", "$15,000 \u2014 tuition only; time has no monetary value", "$25,000 \u2014 a rough average of tuition and forgone wages"], "answer": 2, "explanation": "Opportunity cost includes ALL forgone alternatives. Tuition ($15,000) is an explicit cost \u2014 real money paid. Forgone wages = 40 hrs/week \u00d7 36 weeks \u00d7 $25/hr = $36,000 \u2014 this is an implicit cost (the next best use of her time). Total = $15,000 + $36,000 = $51,000. Choices A and D ignore the implicit cost of time entirely. Choice B ignores tuition. Choice E is not derived from any economic principle."}, {"num": 3, "graph": null, "stem": "", "question": "During an economic recession, hourly wages fall and unemployment rises. Which of the following behaviors is BEST explained by the concept of opportunity cost?", "choices": ["People buy fewer luxury goods during recessions", "More people choose to do their own home repairs rather than hiring contractors", "Firms reduce their investment in new machinery", "The government increases spending on unemployment benefits", "Banks tighten lending standards during downturns"], "answer": 1, "explanation": "When wages fall, the opportunity cost of spending an hour doing your own home repair decreases \u2014 you give up less earnings by working on your own house. This makes do-it-yourself repairs more attractive relative to paid labor. This is a direct application of how opportunity cost changes behavior. The other choices involve government policy (D), firm investment decisions (C), bank behavior (E), or consumer spending on luxury goods (A) \u2014 none of which are primarily explained by the individual opportunity cost of time."}, {"num": 4, "graph": null, "stem": "A senator states: \"American workers are more productive than Asian workers and earn higher wages as a result. Therefore, the government should ban imports of low-wage Asian clothing to preserve the dignity of the American workplace.\"", "question": "Which part of the senator\u2019s statement is positive, and which is normative?", "choices": ["Both parts are positive statements because they refer to real economic data", "Both parts are normative statements because they involve policy recommendations", "\"American workers are more productive\" is normative; the import ban is positive", "\"American workers are more productive\" is positive; the import ban recommendation is normative", "Neither part is a positive or normative statement \u2014 they are both opinions"], "answer": 3, "explanation": "A positive statement is an objective, testable claim about how the world IS. A normative statement is a value judgment about how the world SHOULD be. \"American workers are more productive and earn higher wages\" is a factual (positive) claim that can be tested with data. \"The government should ban imports\" is a normative claim \u2014 it reflects a value judgment about what policy ought to be. Choice D is correct. Choice C reverses the two. Choices A and B incorrectly classify both as the same type."}, {"num": 5, "graph": null, "stem": "Consider the following four statements:\nI. \"Higher taxes on wages reduce workers\u2019 incentive to work.\"\nII. \"We should cut taxes to encourage more work.\"\nIII. \"The public education system produces benefits exceeding its costs.\"\nIV. \"Economics cannot always determine what society ought to do.\"", "question": "Which of the following correctly classifies each statement as positive (P) or normative (N)?", "choices": ["I=P, II=P, III=P, IV=N", "I=P, II=N, III=N, IV=P", "I=N, II=P, III=N, IV=P", "I=P, II=N, III=P, IV=N", "I=N, II=N, III=P, IV=P"], "answer": 1, "explanation": "I: Testable claim about behavior \u2192 Positive. II: Uses \"should\" \u2014 a value judgment \u2192 Normative. III: \"produces benefits exceeding costs\" is a factual claim that can in principle be measured \u2192 Positive (though debated). IV: A statement about the limits of economics itself \u2014 it is objectively true that economics cannot resolve all value conflicts \u2192 Positive. Therefore: I=P, II=N, III=P, IV=P \u2192 Choice B. Choice A incorrectly labels II as positive. Choice D correctly gets I and II but mislabels IV as normative."}, {"num": 6, "graph": "eq3_atlantis_ppc.png", "stem": "The graph above shows Atlantis\u2019s production possibilities curve for potatoes and fish. Points A through F lie on the PPC. Point G (500 lbs potatoes, 400 lbs fish) lies inside the curve. Point H (800 lbs potatoes, 500 lbs fish) lies outside the curve.", "question": "Which statement about points G and H is correct?", "choices": ["Point G is efficient; Point H is feasible but inefficient", "Point G is infeasible; Point H is efficient", "Point G is feasible but inefficient; Point H is currently infeasible", "Both G and H are efficient production points", "Point G is feasible but inefficient; Point H is feasible and efficient"], "answer": 2, "explanation": "A point INSIDE the PPC (like G) is feasible \u2014 Atlantis can produce it \u2014 but it is INEFFICIENT because resources are underutilized; more of one good could be produced without sacrificing the other. A point OUTSIDE the PPC (like H) is currently INFEASIBLE \u2014 it cannot be achieved with existing resources and technology. H would only become reachable through economic growth (better technology or more resources). Choice C is correct. Choice A gets G right but incorrectly says H is feasible. Choice B incorrectly calls G infeasible."}, {"num": 7, "graph": "eq3_atlantis_ppc.png", "stem": "Refer to the Atlantis PPC. Moving from point C (600 potatoes, 500 fish) to point B (800 potatoes, 300 fish) requires giving up fish to grow more potatoes.", "question": "What is the opportunity cost of increasing potato production from 600 to 800 pounds?", "choices": ["200 pounds of fish", "200 pounds of potatoes", "300 pounds of fish", "100 pounds of fish", "500 pounds of fish"], "answer": 0, "explanation": "Opportunity cost is what is given up to gain something. Moving from C to B: potatoes increase by 200 lbs (from 600 to 800), while fish DECREASE by 200 lbs (from 500 to 300). So the opportunity cost of gaining 200 lbs of potatoes is 200 lbs of fish. Choice A is correct. Choice C (300 lbs) would be the opportunity cost of moving from C all the way to A. Choice D (100 lbs) incorrectly underestimates the fish given up between these two points."}, {"num": 8, "graph": "eq3_atlantis_ppc.png", "stem": "Refer to the Atlantis PPC. Compare the opportunity cost of increasing potatoes from 600 to 800 lbs (C\u2192B) with the opportunity cost of increasing potatoes from 200 to 400 lbs (E\u2192D).", "question": "Which of the following is true about these two opportunity costs, and what does this reveal about the PPC?", "choices": ["Both opportunity costs are equal, which means the PPC is a straight line", "The C\u2192B opportunity cost is greater, which means the PPC is concave (bowed out)", "The E\u2192D opportunity cost is greater, which means the PPC is concave (bowed out)", "The C\u2192B opportunity cost is greater, which means the PPC is convex (bowed in)", "Both opportunity costs are equal, which means resources are perfectly substitutable"], "answer": 1, "explanation": "C\u2192B: gain 200 potatoes, give up 200 fish (500\u2192300). E\u2192D: gain 200 potatoes, give up only 50 fish (650\u2192600). The opportunity cost is HIGHER at C\u2192B than at E\u2192D. This reflects the law of increasing opportunity costs \u2014 as more resources are devoted to potato production, increasingly productive fish-catching resources are sacrificed, making each additional unit of potatoes more costly. This causes the PPC to be concave (bowed outward from the origin). Choice B is correct."}, {"num": 9, "graph": "eq3_bermuda_ppc.png", "stem": "Bermuda\u2019s PPC for fish and hotel stays is shown above. In 2000, Bermuda had 307 fishermen catching 286 metric tons of fish and 3,409 hotel workers providing 538,000 hotel stays. The opportunity cost of one additional metric ton of fish is 2,000 hotel stays (constant).", "question": "If ALL 3,409 hotel workers became fishermen, approximately how many total metric tons of fish could Bermuda produce?", "choices": ["286 metric tons", "1,500 metric tons", "3,175 metric tons", "3,461 metric tons", "3,716 metric tons"], "answer": 3, "explanation": "Currently 307 fishermen catch 286 mt, so each fisherman catches 286/307 \u2248 0.931 mt/year. If the 3,409 hotel workers also become fishermen, they add: 3,409 \u00d7 0.931 \u2248 3,175 mt. Total = 286 + 3,175 = 3,461 mt. This is the fish-axis intercept of Bermuda\u2019s PPC. Choice D is correct. Choice C (3,175) only counts the hotel workers\u2019 contribution and forgets the original 286 mt. Choice E adds too much. Choice A ignores the hotel workers entirely."}, {"num": 10, "graph": "eq3_roma_ppc.png", "stem": "The Tivoli can produce 30 lbs of spaghetti OR 50 lbs of meatballs per month (or any linear combination). The Frivoli can produce 40 lbs of spaghetti OR 30 lbs of meatballs per month.", "question": "Which tribe has the comparative advantage in spaghetti production, and which has the comparative advantage in meatball production?", "choices": ["Tivoli: spaghetti; Frivoli: meatballs", "Frivoli: spaghetti; Tivoli: meatballs", "Tivoli: both spaghetti and meatballs", "Frivoli: both spaghetti and meatballs", "Neither tribe has a comparative advantage because PPCs are straight lines"], "answer": 1, "explanation": "Opportunity cost of 1 lb spaghetti \u2014 Tivoli: 50/30 = 5/3 \u2248 1.67 lbs meatballs. Frivoli: 30/40 = 0.75 lbs meatballs. Frivoli gives up LESS meatballs per spaghetti \u2192 Frivoli has comparative advantage in spaghetti. Opportunity cost of 1 lb meatballs \u2014 Tivoli: 30/50 = 0.6 lbs spaghetti. Frivoli: 40/30 \u2248 1.33 lbs spaghetti. Tivoli gives up LESS spaghetti per meatball \u2192 Tivoli has comparative advantage in meatballs. Choice B is correct. Choice A reverses both. Comparative advantage ALWAYS exists for both goods across two parties (ruling out C, D, E)."}, {"num": 11, "graph": "eq3_roma_ppc.png", "stem": "After the Frivoli\u2019s meatball innovation (which DOUBLES their meatball output to 60 lbs/month, with spaghetti unchanged at 40 lbs), the graph shows their new PPC.", "question": "After the innovation, which tribe has the ABSOLUTE advantage in meatball production, and which has the COMPARATIVE advantage in meatball production?", "choices": ["Absolute: Frivoli; Comparative: Frivoli", "Absolute: Frivoli; Comparative: Tivoli", "Absolute: Tivoli; Comparative: Tivoli", "Absolute: Tivoli; Comparative: Frivoli", "Absolute: Frivoli; Comparative: neither \u2014 they are now equal"], "answer": 1, "explanation": "After innovation: Frivoli can produce 60 lbs meatballs vs. Tivoli\u2019s 50 lbs \u2192 Frivoli has ABSOLUTE advantage in meatballs (can produce more). Now recalculate opportunity costs: Frivoli OC of 1 lb meatballs = 40/60 = 2/3 lbs spaghetti. Tivoli OC of 1 lb meatballs = 30/50 = 3/5 = 0.6 lbs spaghetti. Tivoli still gives up LESS spaghetti per meatball \u2192 Tivoli retains COMPARATIVE advantage in meatballs. The absolute advantage shifted to Frivoli, but the comparative advantage stayed with Tivoli. This illustrates the key distinction: absolute advantage is about quantity, comparative advantage is about opportunity cost. Choice B is correct."}, {"num": 12, "graph": "eq3_wheat_corn_ppc.png", "stem": "U.S. farmers use 124 million acres for wheat and corn. The current efficient production point is 2.158 billion bushels of wheat and 11.807 billion bushels of corn. At this point, the opportunity cost of one additional bushel of wheat is 1.7 bushels of corn. Opportunity costs are increasing.", "question": "Farmers transfer 40 million acres from corn to wheat, producing 3.158 billion bushels of wheat and 10.107 billion bushels of corn. What is the status of this new production point?", "choices": ["Infeasible \u2014 it lies outside the PPC", "Feasible but inefficient \u2014 resources are being wasted", "Feasible and efficient \u2014 it lies on the PPC", "Cannot be determined without knowing the exact shape of the PPC", "Infeasible because the opportunity cost of wheat now exceeds 1.7 bushels of corn"], "answer": 2, "explanation": "When land is transferred from corn to wheat, the new point uses ALL 124 million acres (none left unused). Since we start from an efficient point and reallocate all resources, the new point must also lie ON the PPC \u2014 it is feasible AND efficient. Choice C is correct. Choice A is wrong because outside the PPC means more than maximum possible output, which is not the case here. Choice B applies only when resources are idle. Choice E confuses increasing opportunity cost (which applies to future units beyond this point) with the feasibility of this specific reallocation."}, {"num": 13, "graph": "eq3_wheat_corn_ppc.png", "stem": "From the original production point (2.158B wheat, 11.807B corn), farmers leave 24 million acres unused and produce only 1.8 billion bushels of wheat and 9.0 billion bushels of corn.", "question": "What is the status of this production point?", "choices": ["Feasible and efficient \u2014 the farmers have chosen a different point on the PPC", "Feasible but inefficient \u2014 unused land means resources are not fully utilized", "Infeasible \u2014 total output has fallen, which is impossible", "Infeasible \u2014 the point lies outside the PPC", "Efficient \u2014 leaving land fallow is sometimes the best use of resources"], "answer": 1, "explanation": "A production point is FEASIBLE if it can actually be achieved \u2014 yes, Atlantis could simply choose to produce less. It is INEFFICIENT if it lies INSIDE the PPC, meaning resources are not being fully or optimally used. With 24 million acres left unused, the economy is not on the frontier \u2014 it could produce more of both goods by using all available land. Choice B is correct. Choice A is wrong because an efficient point must use all resources. Choice C is factually incorrect \u2014 output falling does not make a point infeasible. Choice D confuses inside with outside the PPC."}, {"num": 14, "graph": null, "stem": "In July 2006, the U.S. exported $1 billion of aircraft to China but imported only $19,000 of aircraft from China. The U.S. imported $83 million of trousers from China but exported only $8,000 of trousers to China.", "question": "What do these trade flows imply about comparative advantage?", "choices": ["The U.S. has comparative advantage in both aircraft and trousers", "China has comparative advantage in both aircraft and trousers", "The U.S. has comparative advantage in aircraft; China has comparative advantage in trousers", "China has comparative advantage in aircraft; the U.S. has comparative advantage in trousers", "Trade patterns alone cannot reveal comparative advantage \u2014 only production data can"], "answer": 2, "explanation": "Countries export goods in which they have a comparative advantage and import goods in which the trading partner has a comparative advantage. The U.S. is a massive NET EXPORTER of aircraft ($1B vs. $19K) \u2192 U.S. has comparative advantage in aircraft. The U.S. is a massive NET IMPORTER of trousers ($83M vs. $8K) \u2192 China has comparative advantage in trousers. Choice C is correct. This does not tell us about absolute advantage \u2014 it\u2019s possible China could be less productive in both, but still have a comparative advantage in trousers due to lower opportunity costs."}, {"num": 15, "graph": null, "stem": "Peter Pundit claims that if the EU becomes more productive than the U.S. in ALL industries, the U.S. will no longer benefit from trade with the EU.", "question": "Which of the following best identifies the flaw in Peter Pundit\u2019s reasoning?", "choices": ["Peter is correct \u2014 if the EU has absolute advantage in everything, trade has no benefit", "Peter confuses absolute advantage with comparative advantage; gains from trade depend on comparative, not absolute, advantage", "Peter is correct, but only if the EU becomes more productive by a factor of 2 or more", "Peter is wrong because trade is determined by government policy, not productivity", "Peter is correct only if the U.S. retains absolute advantage in at least one good"], "answer": 1, "explanation": "This is the classic Peter Pundit fallacy. Gains from trade depend on COMPARATIVE advantage \u2014 the relative opportunity cost of producing goods \u2014 not on absolute productivity. Even if the EU becomes more productive than the U.S. in every industry (has absolute advantage in everything), each country still has a lower opportunity cost in SOME goods relative to the other. The U.S. should specialize in goods where its relative disadvantage is smallest, and the EU should specialize where its advantage is greatest. Both still gain from trade. Choice B is correct. Choice A is the exact mistake Peter makes. Choice E confuses the condition for comparative advantage."}];
const FR=[{"num": 1, "title": "Free-Response Question 1 \u2014 Opportunity Cost & Resources", "graph": null, "context": "A manufacturing firm in Ohio produces two goods: bicycles and scooters. It employs engineers (skilled labor), uses assembly robots (capital), leases a factory building on company-owned land, and is run by a founder who bears all financial risk. The firm currently produces 400 bicycles and 200 scooters per month.", "table": null, "parts": [["a", "Identify one example of each of the four categories of resources (land, labor, capital, entrepreneurship) that this firm uses. Briefly explain each classification."], ["b", "Suppose an engineer currently earns $60,000/year working at the firm. She is offered admission to a graduate engineering program costing $25,000/year in tuition. Identify and calculate ALL opportunity costs she faces if she leaves to attend graduate school. Explain why each item is or is not an opportunity cost."], ["c", "The firm\u2019s founder says, \u2018Our machines are already paid for, so using them costs us nothing.\u2019 Is this statement economically correct? Explain using the concept of opportunity cost."], ["d", "Is the statement \u2018The government should subsidize domestic manufacturers to protect American jobs\u2019 a positive or normative statement? Is the statement \u2018Subsidizing domestic manufacturers raises consumer prices\u2019 positive or normative? Explain the difference."]], "answers": [["a", "Land: The factory building\u2019s land (natural resource the firm uses for production). Labor: The engineers who design and assemble the products (human time and effort). Capital: The assembly robots (manufactured tools used to produce other goods). Entrepreneurship: The founder who organizes production, takes financial risk, and makes key business decisions. Each is classified by its economic function, not its monetary value."], ["b", "Explicit cost: $25,000/year tuition \u2014 actual money paid out. Implicit cost: $60,000/year forgone salary \u2014 the best alternative use of her time. Total opportunity cost = $85,000/year. The salary IS an opportunity cost because attending school prevents her from earning it. Room and board are NOT additional opportunity costs if she would have incurred those living expenses anyway. The tuition IS a cost because it is a direct payment she would not make otherwise."], ["c", "The founder\u2019s statement is economically INCORRECT. Even though the machines are already purchased (sunk cost), using them still has an opportunity cost \u2014 the machines could potentially be leased to another firm, sold, or used to produce a different product. The economic cost of using a resource is its opportunity cost \u2014 the value of the next best alternative use \u2014 regardless of whether it was pre-paid. Only truly irreversible, unrecoverable costs (sunk costs) have zero opportunity cost going forward."], ["d", "\u2018The government should subsidize manufacturers to protect jobs\u2019 \u2014 NORMATIVE. It contains \u2018should,\u2019 expressing a value judgment about what policy ought to be. Reasonable people can disagree based on values. \u2018Subsidizing manufacturers raises consumer prices\u2019 \u2014 POSITIVE. This is an empirically testable prediction about cause and effect \u2014 it can in principle be confirmed or refuted with data. The key distinction: positive statements describe the world as it IS; normative statements prescribe what SHOULD be done."]]}, {"num": 2, "title": "Free-Response Question 2 \u2014 Atlantis PPC", "graph": "eq3_atlantis_ppc.png", "context": "Atlantis produces only potatoes and fish. The table below shows maximum annual output combinations.\n\nPoint | Potatoes (lbs) | Fish (lbs)\n  A   |    1,000       |     0\n  B   |      800       |   300\n  C   |      600       |   500\n  D   |      400       |   600\n  E   |      200       |   650\n  F   |        0       |   675", "table": null, "parts": [["a", "Can Atlantis produce 500 lbs of fish and 800 lbs of potatoes simultaneously? Explain where this point lies relative to the PPC and what it implies."], ["b", "Calculate the opportunity cost of increasing potato output from 600 to 800 lbs (moving from C to B). Then calculate the opportunity cost of increasing potato output from 200 to 400 lbs (moving from E to D). Show all work."], ["c", "Are these two opportunity costs the same or different? What does this tell you about the shape of Atlantis\u2019s PPC and the nature of its resources?"], ["d", "Suppose a new fishing technology is discovered that doubles the amount of fish catchable at every level of potato production. Describe what happens to the PPC. Sketch the change in words: which intercept(s) shift, and in which direction?"]], "answers": [["a", "No. From the table, when potatoes = 800 lbs, the maximum fish output is 300 lbs (Point B). Producing 500 lbs of fish alongside 800 lbs of potatoes would require more resources than Atlantis has. This point lies OUTSIDE the PPC. It is currently infeasible \u2014 Atlantis cannot reach it with existing resources and technology. It would only become achievable through economic growth (e.g., more resources or better technology)."], ["b", "C\u2192B: Potatoes increase from 600 to 800 (+200 lbs). Fish decrease from 500 to 300 (\u2212200 lbs). Opportunity cost = 200 lbs of fish. E\u2192D: Potatoes increase from 200 to 400 (+200 lbs). Fish decrease from 650 to 600 (\u221250 lbs). Opportunity cost = 50 lbs of fish."], ["c", "The two opportunity costs are DIFFERENT: gaining the same 200 lbs of potatoes costs 200 lbs of fish near the potato-heavy end (C\u2192B) but only 50 lbs of fish near the fish-heavy end (E\u2192D). This demonstrates the law of increasing opportunity costs \u2014 as more resources are devoted to potato production, the opportunity cost of each additional pound rises. This occurs because resources are not perfectly adaptable: the best fish-catching resources are the worst at growing potatoes. The PPC is therefore CONCAVE (bowed outward from the origin), not a straight line."], ["d", "A technology that doubles fish output at every potato level shifts the FISH-AXIS INTERCEPT upward (from 675 to 1,350 lbs), while the POTATO-AXIS INTERCEPT remains unchanged at 1,000 lbs (the technology only affects fish). The entire PPC rotates outward \u2014 all points involving some fish production move upward \u2014 but the all-potato point A stays fixed. The curve remains concave but is now steeper everywhere, reflecting the improved fish productivity."]]}, {"num": 3, "title": "Free-Response Question 3 \u2014 Bermuda & Constant Opportunity Cost", "graph": "eq3_bermuda_ppc.png", "context": "In 2000, Bermuda had 307 fishermen catching 286 metric tons of fish and 3,409 hotel workers providing 538,000 hotel stays. The economy is efficient. The opportunity cost of one additional metric ton of fish is 2,000 hotel stays, and this cost is constant.", "table": null, "parts": [["a", "If all 307 fishermen moved to hotels, how many total hotel stays could Bermuda produce? Show your calculation."], ["b", "If all 3,409 hotel workers became fishermen, how many total metric tons of fish could Bermuda produce? Show your calculation."], ["c", "Using your answers from (a) and (b), draw and describe Bermuda\u2019s PPC. What is the shape of the PPC, and why? Label the actual 2000 production point."], ["d", "The opportunity cost of fish is constant at 2,000 hotel stays per metric ton. What does this imply about the nature of Bermuda\u2019s resources (labor) in these two industries? How does this differ from Atlantis (Problem 8)?"]], "answers": [["a", "Hotel productivity: 538,000 stays \u00f7 3,409 workers \u2248 157.8 stays/worker. Moving 307 fishermen to hotels: 307 \u00d7 157.8 \u2248 48,449 additional stays. Total hotel stays = 538,000 + 48,449 \u2248 586,449 stays. (Rounded: \u2248 586,000\u2013587,000 depending on rounding.)"], ["b", "Fish productivity: 286 mt \u00f7 307 fishermen \u2248 0.9316 mt/fisherman. Moving 3,409 hotel workers to fishing: 3,409 \u00d7 0.9316 \u2248 3,175 mt additional. Total fish = 286 + 3,175 = 3,461 mt."], ["c", "Bermuda\u2019s PPC is a STRAIGHT LINE from (0 fish, 586,449 hotel stays) to (3,461 fish, 0 hotel stays), with the 2000 actual point at (286 mt, 538,000 stays) on the PPC. The PPC is straight because the opportunity cost is CONSTANT \u2014 every metric ton of fish costs exactly 2,000 hotel stays regardless of how much fish is being produced. The slope = \u2212586,449/3,461 \u2248 \u22122,000 hotel stays per mt, which matches the given opportunity cost."], ["d", "Constant opportunity cost implies that Bermuda\u2019s workers are equally productive in fishing and hotel work \u2014 or more precisely, each worker shifted from hotels to fishing sacrifices the same amount of hotel output and produces the same amount of fish. Workers are PERFECTLY SUBSTITUTABLE between the two industries. This contrasts with Atlantis, which has INCREASING opportunity costs, implying resources are specialized \u2014 the best potato-growing land and skills are poor for fishing, so shifting more resources from fish to potatoes becomes progressively more costly."]]}, {"num": 4, "title": "Free-Response Question 4 \u2014 Comparative & Absolute Advantage", "graph": "eq3_roma_ppc.png", "context": "In Roma, the Tivoli produce up to 30 lbs of spaghetti OR 50 lbs of meatballs per month. The Frivoli produce up to 40 lbs of spaghetti OR 30 lbs of meatballs per month. After a new technique, the Frivoli can now produce up to 60 lbs of meatballs (spaghetti capacity unchanged at 40 lbs).", "table": null, "parts": [["a", "Before the innovation, calculate the opportunity cost of 1 lb of spaghetti for each tribe. Which tribe has the comparative advantage in spaghetti? Which has comparative advantage in meatballs? Explain."], ["b", "After the Frivoli\u2019s innovation, who has the absolute advantage in meatball production? Recalculate opportunity costs and determine who now has the comparative advantage in meatball production."], ["c", "After the innovation, should the two tribes still trade? If so, who should specialize in what? Explain your reasoning carefully."], ["d", "Suppose the Frivoli\u2019s innovation also doubled their spaghetti capacity to 80 lbs (while meatballs remain at 60 lbs). Would the Tivoli still have a comparative advantage in meatball production? Show your calculation."]], "answers": [["a", "Tivoli OC of 1 lb spaghetti = 50/30 = 5/3 \u2248 1.67 lbs meatballs. Frivoli OC of 1 lb spaghetti = 30/40 = 0.75 lbs meatballs. Frivoli gives up LESS meatballs per spaghetti \u2192 Frivoli has comparative advantage in spaghetti. By symmetry: Tivoli OC of 1 lb meatballs = 30/50 = 0.6 lbs spaghetti. Frivoli OC of 1 lb meatballs = 40/30 \u2248 1.33 lbs spaghetti. Tivoli gives up LESS spaghetti per meatball \u2192 Tivoli has comparative advantage in meatballs."], ["b", "After innovation: Frivoli can produce 60 lbs meatballs vs. Tivoli\u2019s 50 lbs \u2192 Frivoli has ABSOLUTE advantage in meatballs. New opportunity costs: Frivoli OC of 1 lb meatballs = 40/60 = 2/3 \u2248 0.67 lbs spaghetti. Tivoli OC of 1 lb meatballs = 30/50 = 0.6 lbs spaghetti. Tivoli STILL gives up less spaghetti per meatball (0.6 < 0.67) \u2192 Tivoli retains COMPARATIVE advantage in meatballs despite Frivoli\u2019s absolute advantage."], ["c", "Yes, the tribes should still trade \u2014 comparative advantage, not absolute advantage, determines gains from trade. Frivoli has comparative advantage in spaghetti (OC = 0.67 lb meatballs per lb spaghetti vs. Tivoli\u2019s 1.67). Tivoli has comparative advantage in meatballs (OC = 0.6 lb spaghetti per lb meatballs vs. Frivoli\u2019s 0.67). Tivoli should specialize in meatballs; Frivoli should specialize in spaghetti. Both can consume beyond their individual PPCs through trade, achieving higher total output than under self-sufficiency."], ["d", "With Frivoli now at 80 lbs spaghetti / 60 lbs meatballs: Frivoli OC of 1 lb meatballs = 80/60 = 4/3 \u2248 1.33 lbs spaghetti. Tivoli OC of 1 lb meatballs = 30/50 = 0.6 lbs spaghetti. Tivoli OC (0.6) < Frivoli OC (1.33) \u2192 YES, Tivoli still has comparative advantage in meatballs. Even as Frivoli improves dramatically, Tivoli\u2019s lower opportunity cost preserves its comparative advantage in meatballs. Comparative advantage is a relative concept \u2014 it depends on the ratio of opportunity costs, not absolute productivity levels."]]}, {"num": 5, "title": "Free-Response Question 5 \u2014 Trade, Specialization & Policy", "graph": null, "context": "A U.S. clothing industry representative argues: \u2018Workers in Asia earn only pennies an hour. American workers are more productive and earn higher wages as a result. To preserve the dignity of the American workplace, the government should ban imports of low-wage Asian clothing.\u2019", "table": null, "parts": [["a", "Identify which parts of the representative\u2019s statement are positive and which are normative. Explain how you distinguish them."], ["b", "Is the proposed import ban consistent with the stated facts about wages and productivity? That is, if American workers are genuinely more productive, do American firms need protection from lower-wage foreign competition? Explain using the concept of comparative advantage."], ["c", "Would an import ban make some Americans better off without making any Americans worse off? Evaluate whether the policy would be economically efficient from the perspective of ALL Americans."], ["d", "How would low-wage Asian workers be affected by the import ban? Use the concept of comparative advantage and gains from trade in your answer."]], "answers": [["a", "Positive statements (factual, testable): \u2018Workers in Asia earn only pennies an hour\u2019 (verifiable with wage data), \u2018American workers are more productive\u2019 (measurable with output-per-worker data), and \u2018higher productivity results in higher wages\u2019 (an empirical relationship). Normative statements (value judgments): \u2018The government should ban imports\u2019 and \u2018to preserve the dignity of the American workplace\u2019 both reflect value judgments about what ought to be done \u2014 reasonable people can disagree based on differing values, and data alone cannot settle them."], ["b", "No, the policy is NOT logically consistent with the stated facts. Even if American workers have absolute advantage in clothing (higher productivity), trade is determined by COMPARATIVE advantage, not absolute advantage. If Asia has a comparative advantage in clothing (lower opportunity cost), then the U.S. benefits from importing clothing and devoting its resources to industries where it has comparative advantage (e.g., high-tech manufacturing, aircraft). American firms don\u2019t need protection simply because Asian wages are low \u2014 high productivity can offset high wages. The real question is relative opportunity cost, not absolute wage levels."], ["c", "No, the import ban would NOT be efficient for all Americans. While it would benefit American clothing workers (higher employment, higher wages), it would harm American CONSUMERS, who would pay higher prices for clothing. It would also harm industries that export to Asia, since trade restrictions typically invite retaliation. This is a redistributive policy, not an efficiency-enhancing one \u2014 it makes some Americans (clothing workers) better off at the expense of others (consumers and export industries). Economic efficiency requires that gains exceed losses, but here the deadweight loss from restricted trade means total American welfare falls."], ["d", "Asian workers would be HURT by the import ban. Currently, Asian workers benefit from trade because exporting clothing to the U.S. allows them to earn income and specialize in the industry where they have a comparative advantage. An import ban eliminates that market, reducing demand for Asian-made clothing, lowering wages and employment in Asian textile industries. This is ironic given the representative\u2019s concern for worker dignity \u2014 the policy intended to help American workers would reduce the income of the very low-wage Asian workers it mentions. Gains from trade flow to BOTH parties \u2014 restricting trade harms both sides."]]}];

function buildQuiz(){
  const main=document.getElementById('quizMain');main.innerHTML='';
  main.appendChild(Object.assign(document.createElement('div'),{innerHTML:`<div class="section-div"><h2>Multiple Choice</h2><p>Choose the best answer — detailed feedback on every option</p></div>`}));
  MC.forEach((q,qi)=>{
    const card=document.createElement('div');card.className='q-card';card.id=`card-${qi}`;

    const hdr=document.createElement('div');hdr.className='q-header';
    hdr.innerHTML=`<span class="q-num">${qi+1}</span><span class="q-badge">Multiple Choice</span><span class="q-status" id="st-${qi}"></span>`;
    card.appendChild(hdr);

    if(q.graph&&IMAGES[q.graph]){
      const gd=document.createElement('div');gd.className='q-graph';
      gd.innerHTML=`<img src="${IMAGES[q.graph]}" alt="graph">`;
      card.appendChild(gd);
    }

    const body=document.createElement('div');body.className='q-body';
    body.innerHTML=(q.stem?`<p class="q-stem">${q.stem}</p>`:'')+`<p class="q-question">${q.question}</p>`;
    card.appendChild(body);

    const cd=document.createElement('div');cd.className='choices';
    q.choices.forEach((txt,ci)=>{
      const btn=document.createElement('div');btn.className='choice';
      btn.innerHTML=`<span class="choice-letter">${letters[ci]}</span><span>${txt}</span>`;
      btn.onclick=()=>pick(qi,ci);cd.appendChild(btn);
    });
    card.appendChild(cd);

    const ex=document.createElement('div');ex.className='explanation';ex.id=`ex-${qi}`;
    card.appendChild(ex);

    main.appendChild(card);
  });
  const res=document.createElement('div');res.id='results';
  res.innerHTML=`<h2>Multiple Choice Complete!</h2><div class="score-big" id="fs"></div><p id="fm"></p><button class="btn-reset" onclick="reset()">Try Again</button>`;
  main.appendChild(res);
  main.appendChild(Object.assign(document.createElement('div'),{innerHTML:`<div class="section-div" style="margin-top:1rem"><h2>Free Response</h2><p>Show all work · Reveal model answers when ready</p></div>`}));
  FR.forEach((q,qi)=>{
    const card=document.createElement('div');card.className='fr-card';
    card.innerHTML=`<div class="fr-header"><h3>${q.title}</h3><span class="fr-badge">Free Response</span></div>`;
    if(q.graph&&IMAGES[q.graph])card.innerHTML+=`<div class="fr-graph"><img src="${IMAGES[q.graph]}" alt="graph"></div>`;
    card.innerHTML+=`<div class="fr-body"><pre class="fr-context">${q.context}</pre></div>`;
    const parts=document.createElement('div');parts.className='fr-parts';
    q.parts.forEach(([lbl,txt],pi)=>{
      const ans=q.answers[pi][1];
      const p=document.createElement('div');p.className='fr-part';
      p.innerHTML=`<div class="fr-part-label">Part (${lbl})</div><div class="fr-part-q">${txt}</div><div class="fr-answer" id="fa-${qi}-${pi}"><strong>Model Answer:</strong> ${ans}</div><button class="show-answer-btn" onclick="tog('fa-${qi}-${pi}',this)">Show Answer</button>`;
      parts.appendChild(p);
    });
    card.appendChild(parts);main.appendChild(card);
  });
}
function pick(qi,ci){
  const card=document.getElementById(`card-${qi}`);
  if(card.classList.contains('answered-correct')||card.classList.contains('answered-wrong'))return;
  const q=MC[qi];const ch=card.querySelectorAll('.choice');
  ch.forEach(c=>c.classList.add('disabled'));
  const ok=ci===q.answer;if(ok)correct++;answered++;
  ch[ci].classList.add(ok?'correct':'wrong');
  if(!ok)ch[q.answer].classList.add('reveal-correct');
  card.classList.add(ok?'answered-correct':'answered-wrong');
  const st=document.getElementById(`st-${qi}`);
  st.textContent=ok?'✓':'✗';st.style.color=ok?'var(--green)':'var(--red)';
  const ex=document.getElementById(`ex-${qi}`);ex.style.display='block';
  if(ok)ex.innerHTML=`<strong>Correct!</strong> ${q.explanation}`;
  else{ex.classList.add('wrong-exp');ex.innerHTML=`<strong>Incorrect.</strong> Correct answer: <strong>${letters[q.answer]}</strong>. ${q.explanation}`;}
  upd();if(answered===MC.length)setTimeout(done,700);
}
function upd(){
  document.getElementById('progressFill').style.width=(answered/MC.length*100)+'%';
  document.getElementById('progressText').textContent=`MC: ${answered} / ${MC.length}`;
  document.getElementById('scorePill').textContent=`Score: ${correct}`;
}
function done(){
  const res=document.getElementById('results');res.style.display='block';
  const pct=Math.round(correct/MC.length*100);
  document.getElementById('fs').textContent=`${correct} / ${MC.length}`;
  const msg=pct>=90?'Exceptional! Mastery of PPC and comparative advantage.':
            pct>=70?'Great work! Strong grasp of opportunity cost and trade.':
            pct>=50?'Good effort. Review comparative vs. absolute advantage.':
                    'Keep studying — revisit PPC analysis and opportunity cost.';
  document.getElementById('fm').textContent=msg+` (${pct}%)`;
  res.scrollIntoView({behavior:'smooth',block:'center'});
}
function reset(){answered=0;correct=0;upd();buildQuiz();window.scrollTo({top:0,behavior:'smooth'});}
function tog(id,btn){
  const el=document.getElementById(id);
  if(el.style.display==='block'){el.style.display='none';btn.textContent='Show Answer';}
  else{el.style.display='block';btn.textContent='Hide Answer';}
}
buildQuiz();
</script>
